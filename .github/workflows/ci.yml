# .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1a. Auto-fix (push to main only)
  #    Ruff fixes what it can and commits the changes back before the linter checks them.
  # ---------------------------------------------------------------------------
  auto-fix:
    name: Auto-fix (ruff)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write   # needed for git push

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Ruff fix
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --fix ."

      - name: Ruff format
        uses: astral-sh/ruff-action@v3
        with:
          args: "format ."

      - name: Commit fixes (jeśli cokolwiek zmieniono)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix by ruff [skip ci]"
          commit_options: "--no-verify"
          # [skip ci] prevents an infinite loop in the CI runs

  # ---------------------------------------------------------------------------
  # 1b. Lint & format check
  #     The push to main is pending until the auto-fix is complete.
  #     In a PR, the auto-fix is skipped, so this job starts immediately.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    needs: [auto-fix]
    if: |
      always() &&
      (needs.auto-fix.result == 'success' || needs.auto-fix.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check for trailing whitespace
        run: |
          if grep -rn " $" --include="*.py" --include="*.yml" --include="*.yaml" \
                           --include="*.toml" --include="*.md" .; then
            echo "Trailing whitespace found!" && exit 1
          fi

      - name: Check for merge conflict markers
        run: |
          if grep -rn "<<<<<<< \|>>>>>>> \|=======$" \
                  --include="*.py" --include="*.html" \
                  --exclude-dir=".github" .; then
            echo "Merge conflict markers found!" && exit 1
          fi

      - name: Check YAML syntax
        run: |
          pip install pyyaml --quiet
          python -c "
          import yaml, sys, pathlib
          errors = []
          for pattern in ('*.yml', '*.yaml'):
            for f in pathlib.Path('.').rglob(pattern):
              try:
                yaml.safe_load(f.read_text())
              except yaml.YAMLError as e:
                errors.append(f'{f}: {e}')
          if errors:
            print('\n'.join(errors)); sys.exit(1)
          "

      - name: Check TOML syntax
        run: |
          pip install tomli --quiet
          python -c "
          import tomli, sys, pathlib
          errors = []
          for f in pathlib.Path('.').rglob('*.toml'):
            try:
              tomli.loads(f.read_text())
            except Exception as e:
              errors.append(f'{f}: {e}')
          if errors:
            print('\n'.join(errors)); sys.exit(1)
          "

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          args: "check ."

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check ."

  # ---------------------------------------------------------------------------
  # 2. Tests – results displayed as a graphical report in the “Summary” tab on GitHub
  # ---------------------------------------------------------------------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.10-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.10-

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Run pytest
        # --junit-xml  -> XML file parsed by GitHub to generate a graphical report
        # -q           -> cleaner output in the logs
        run: |
          poetry run pytest \
            --junit-xml=reports/junit.xml \
            --no-header \
            -q
        continue-on-error: true   # we collect the report even if the tests fail
        id: pytest

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: reports/junit.xml
          check_name: "Test Results"
          job_summary: true
          # Comment with a summary in PR (not for pushing to main)
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}

      - name: Fail job jesli pytest zwrocil blad
        if: steps.pytest.outcome == 'failure'
        run: exit 1

  # ---------------------------------------------------------------------------
  # 3. Commit validation (PRs only)
  # ---------------------------------------------------------------------------
  commit-lint:
    name: Commit message lint (commitizen)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install commitizen
        run: pip install commitizen --quiet

      - name: Validate commit messages in PR
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          cz check --rev-range "$BASE..$HEAD"
