# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel the previous run of the same PR/branch if a new commit appears
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Linting and formatting (ruff) + basic pre-commit hooks
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check for trailing whitespace
        run: |
          if grep -rn " $" --include="*.py" --include="*.yml" --include="*.yaml" --include="*.toml" --include="*.md" .; then
            echo "Trailing whitespace found!" && exit 1
          fi

      - name: Check for merge conflict markers
        run: |
          if grep -rn "<<<<<<< \|>>>>>>> \|=======$" --include="*.py" --include="*.yml" --include="*.html" .; then
            echo "Merge conflict markers found!" && exit 1
          fi

      - name: Check YAML syntax
        run: |
          pip install pyyaml --quiet
          python -c "
          import yaml, sys, pathlib
          errors = []
          for f in pathlib.Path('.').rglob('*.yml'):
            try:
              yaml.safe_load(f.read_text())
            except yaml.YAMLError as e:
              errors.append(f'{f}: {e}')
          for f in pathlib.Path('.').rglob('*.yaml'):
            try:
              yaml.safe_load(f.read_text())
            except yaml.YAMLError as e:
              errors.append(f'{f}: {e}')
          if errors:
            print('\n'.join(errors)); sys.exit(1)
          "

      - name: Check TOML syntax
        run: |
          python -c "
          import tomllib, sys, pathlib
          errors = []
          for f in pathlib.Path('.').rglob('*.toml'):
            try:
              tomllib.loads(f.read_text())
            except Exception as e:
              errors.append(f'{f}: {e}')
          if errors:
            print('\n'.join(errors)); sys.exit(1)
          "

      # Ruff - linter
      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          args: "check ."

      # Ruff - formatter
      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check ."

  # ---------------------------------------------------------------------------
  # 2. Tests (pytest)
  # ---------------------------------------------------------------------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    # needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.10-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.10-

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Run pytest
        run: poetry run pytest

  # ---------------------------------------------------------------------------
  # 3. Commit format validation (commitizen)
  #    Checks ALL commits in the PR against the base branch
  # ---------------------------------------------------------------------------
  commit-lint:
    name: Commit message lint (commitizen)
    runs-on: ubuntu-latest
    # Checking commits only makes sense in a pull request; 
    # when pushing to the main branch, the commits are already approved
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout (pełna historia dla commitizen)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # commitizen needs the full git history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install commitizen
        run: pip install commitizen --quiet

      - name: Validate commit messages in PR
        run: |
          # Sprawdź wszystkie commity od rozwidlenia z bazowym branchem
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          cz check --rev-range "$BASE..$HEAD"
